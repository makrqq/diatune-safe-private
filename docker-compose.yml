services:
  api:
    build: .
    container_name: diatune-safe-api
    env_file:
      - .env
    command: ["diatune-safe", "api", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"
    volumes:
      - ./data:/workspace/data

  worker:
    build: .
    container_name: diatune-safe-worker
    env_file:
      - .env
    command: ["diatune-safe", "worker"]
    volumes:
      - ./data:/workspace/data
